<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 250px;
      padding: 15px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 14px;
      color: #333;
    }
    h1 {
      font-size: 16px;
      margin: 0 0 15px 0;
      color: #1a73e8;
    }
    .zoom-control {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 15px;
    }
    .zoom-control label {
      flex-shrink: 0;
    }
    .zoom-control input[type="number"] {
      width: 70px;
      padding: 5px 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 14px;
    }
    .zoom-control span {
      color: #666;
    }
    .preset-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-bottom: 15px;
    }
    .preset-btn {
      padding: 5px 10px;
      border: 1px solid #ddd;
      border-radius: 4px;
      background: #f8f9fa;
      cursor: pointer;
      font-size: 12px;
    }
    .preset-btn:hover {
      background: #e8e8e8;
    }
    .preset-btn.active {
      background: #1a73e8;
      color: white;
      border-color: #1a73e8;
    }
    .save-btn {
      width: 100%;
      padding: 8px;
      background: #1a73e8;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
    }
    .save-btn:hover {
      background: #1557b0;
    }
    .status {
      margin-top: 10px;
      padding: 8px;
      border-radius: 4px;
      font-size: 12px;
      text-align: center;
      display: none;
    }
    .status.success {
      display: block;
      background: #d4edda;
      color: #155724;
    }
    .status.error {
      display: block;
      background: #f8d7da;
      color: #721c24;
    }
    .current-zoom {
      font-size: 12px;
      color: #666;
      margin-bottom: 10px;
    }
  </style>
</head>
<body>
  <h1>PDF Zoom Memory</h1>

  <div class="current-zoom">
    Current saved zoom: <strong id="currentZoom">--</strong>%
  </div>

  <div class="zoom-control">
    <label for="zoomLevel">Zoom:</label>
    <input type="number" id="zoomLevel" min="25" max="500" step="5" value="149">
    <span>%</span>
  </div>

  <div class="preset-buttons">
    <button class="preset-btn" data-zoom="50">50%</button>
    <button class="preset-btn" data-zoom="75">75%</button>
    <button class="preset-btn" data-zoom="100">100%</button>
    <button class="preset-btn" data-zoom="125">125%</button>
    <button class="preset-btn" data-zoom="150">150%</button>
    <button class="preset-btn" data-zoom="175">175%</button>
    <button class="preset-btn" data-zoom="200">200%</button>
  </div>

  <button class="save-btn" id="saveBtn">Save Zoom Level</button>

  <div class="status" id="status"></div>

  <script src="popup.js"></script>
</body>
</html>
