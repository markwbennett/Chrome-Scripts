<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      width: 220px;
      padding: 12px;
      font-family: system-ui, sans-serif;
      font-size: 13px;
    }
    h3 {
      margin: 0 0 10px 0;
      font-size: 14px;
    }
    label {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
      cursor: pointer;
    }
    select {
      width: 100%;
      padding: 4px;
      font-size: 13px;
    }
    .setting {
      margin-bottom: 10px;
    }
    .label-text {
      font-weight: 500;
      margin-bottom: 4px;
    }
  </style>
</head>
<body>
  <h3>MRU Tabs</h3>

  <label>
    <input type="checkbox" id="enabled" checked>
    Enabled
  </label>

  <div class="setting">
    <div class="label-text">Most recent tab goes to:</div>
    <select id="direction">
      <option value="right">Right end</option>
      <option value="left">Left end</option>
    </select>
  </div>

  <script src="popup.js"></script>
</body>
</html>
