<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 250px;
      padding: 20px;
      font-family: Arial, sans-serif;
    }
    
    .header {
      text-align: center;
      margin-bottom: 20px;
    }
    
    .header h3 {
      margin: 0;
      color: #333;
    }
    
    .description {
      font-size: 14px;
      color: #666;
      margin-bottom: 20px;
      line-height: 1.4;
    }
    
    .unstack-btn {
      width: 100%;
      padding: 12px;
      background-color: #ea4335;
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 16px;
      cursor: pointer;
      margin-bottom: 10px;
    }
    
    .unstack-btn:hover {
      background-color: #d33b2c;
    }
    
    .unstack-btn:disabled {
      background-color: #ccc;
      cursor: not-allowed;
    }
    
    .status {
      text-align: center;
      font-size: 14px;
      margin-top: 10px;
      min-height: 20px;
    }
    
    .success {
      color: #0f9d58;
    }
    
    .error {
      color: #ea4335;
    }
  </style>
</head>
<body>
  <div class="header">
    <h3>Unstack All Tabs</h3>
  </div>
  
  <div class="description">
    This will remove all tabs from their stacks/groups. All tabs will become individual tabs.
  </div>
  
  <button id="unstackBtn" class="unstack-btn">
    Remove All Tab Stacks
  </button>
  
  <div id="status" class="status"></div>
  
  <script src="popup.js"></script>
</body>
</html>
