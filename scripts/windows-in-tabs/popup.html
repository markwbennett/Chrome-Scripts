<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document Viewer Tab Opener</title>
    <style>
        body {
            width: 250px;
            padding: 15px;
            font-family: Arial, sans-serif;
            margin: 0;
        }
        
        .header {
            text-align: center;
            margin-bottom: 15px;
        }
        
        .title {
            font-size: 16px;
            font-weight: bold;
            color: #333;
            margin-bottom: 5px;
        }
        
        .subtitle {
            font-size: 12px;
            color: #666;
        }
        
        .status {
            background: #e8f5e8;
            border: 1px solid #4caf50;
            border-radius: 4px;
            padding: 10px;
            text-align: center;
            margin-bottom: 15px;
        }
        
        .status-text {
            color: #2e7d32;
            font-size: 14px;
            margin: 0;
        }
        
        .info {
            font-size: 12px;
            color: #555;
            line-height: 1.4;
            text-align: center;
        }
        
        .icon {
            font-size: 24px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="icon">📄➡️📑</div>
        <div class="title">Document Viewer</div>
        <div class="subtitle">Tab Opener</div>
    </div>
    
    <div class="status">
        <p class="status-text">✅ Extension Active</p>
    </div>
    
    <div class="info">
        This extension automatically opens Harris County District Clerk documents in new tabs instead of popup windows.
        <br><br>
        <strong>No configuration needed!</strong>
        <br><br>
        Simply click document links as usual on the website.
    </div>
</body>
</html>
