<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 300px;
      padding: 20px;
      font-family: Arial, sans-serif;
    }
    
    .header {
      text-align: center;
      margin-bottom: 20px;
    }
    
    .header h3 {
      margin: 0;
      color: #333;
    }
    
    .description {
      font-size: 14px;
      color: #666;
      margin-bottom: 20px;
      line-height: 1.4;
    }
    
    .organize-btn {
      width: 100%;
      padding: 12px;
      background-color: #4285f4;
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 16px;
      cursor: pointer;
      margin-bottom: 10px;
    }
    
    .organize-btn:hover {
      background-color: #3367d6;
    }
    
    .organize-btn:disabled {
      background-color: #ccc;
      cursor: not-allowed;
    }
    
    .status {
      text-align: center;
      font-size: 14px;
      margin-top: 10px;
      min-height: 20px;
    }
    
    .success {
      color: #0f9d58;
    }
    
    .error {
      color: #ea4335;
    }
  </style>
</head>
<body>
  <div class="header">
    <h3>Tab Sort & Stack</h3>
  </div>
  
  <div class="description">
    This will refresh sleeping tabs and organize your tabs into stacks grouped by domain name. Tabs from the same website will be grouped together. Check the console (F12) for detailed logs.
  </div>
  
  <button id="organizeBtn" class="organize-btn">
    Refresh & Organize Tabs by Domain
  </button>
  
  <button id="reloadBtn" class="organize-btn" style="background-color: #34a853;">
    Reload Extension
  </button>
  
  <div id="status" class="status"></div>
  
  <script src="popup.js"></script>
</body>
</html>
