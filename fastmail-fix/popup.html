<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <div class="container">
        <h3>Fastmail Settings</h3>
        
        <div class="setting-group">
            <label for="fontSize">Message Font Size: <span id="fontSizeValue">18</span>px</label>
            <input type="range" id="fontSize" min="12" max="24" value="18" step="1">
        </div>
    </div>
    
    <script src="popup.js"></script>
</body>
</html>
