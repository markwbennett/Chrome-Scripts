<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 320px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #15202b;
      color: #e7e9ea;
      margin: 0;
    }
    h2 {
      margin: 0 0 8px 0;
      font-size: 16px;
    }
    p {
      font-size: 13px;
      color: #8b98a5;
      margin: 0 0 12px 0;
      line-height: 1.4;
    }
    #status {
      font-size: 13px;
      margin: 12px 0 0 0;
      padding: 8px;
      border-radius: 8px;
      background: #1e2e3d;
      min-height: 20px;
      max-height: 200px;
      overflow-y: auto;
    }
    #status.error {
      background: #3d1e1e;
      color: #f4212e;
    }
    button {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 9999px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s;
    }
    #blockBtn {
      background: #f4212e;
      color: #fff;
    }
    #blockBtn:hover {
      background: #dc1d28;
    }
    #blockBtn:disabled {
      background: #555;
      cursor: not-allowed;
    }
    #stopBtn {
      background: #536471;
      color: #fff;
      margin-top: 8px;
      display: none;
    }
    #stopBtn:hover {
      background: #6e7c87;
    }
    .log-line {
      font-size: 12px;
      padding: 2px 0;
      border-bottom: 1px solid #253341;
    }
    .log-line:last-child {
      border-bottom: none;
    }
    .log-blocked {
      color: #f4212e;
    }
    .log-skip {
      color: #71767b;
    }
    .log-info {
      color: #1d9bf0;
    }
  </style>
</head>
<body>
  <h2>X Mass Blocker</h2>
  <p>Navigate to an X search results page, then click the button below to block every visible poster. Scroll down to load more tweets first if needed.</p>
  <button id="blockBtn">Block All Visible Users</button>
  <button id="stopBtn">Stop</button>
  <div id="status"></div>
  <script src="popup.js"></script>
</body>
</html>
